name: Build & Verify Binaries

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-test:
    name: Build + Version Check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x86_64
            target: bun-windows-x64
            triple: x86_64-pc-windows-msvc
            shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Show Bun & Node versions
        run: |
          bun --version
          node --version

      - name: Build matched binary (Bun.build / compile)
        run: |
          bun ./scripts/build.ts
        shell: bash

      - name: Build matched binary ( shell )
        run: |
          bun build-shell
        shell: bash

      - name: Verify matched binary prints version (shell binary)
        if: ${{ matrix.shell == 'pwsh' }}
        run: |
          $Expected = "0.0.1"
          Write-Host "Expected version: $Expected"
          $Binary = ".\dist\win-shell.exe"
          Write-Host "Testing $Binary"
          $Out = & .\$Binary
          Write-Host "Output: $Out"
          if ($Out -ne $Expected) {
            Write-Error "Version mismatch (got '$Out')"
            exit 1
          }
        shell: pwsh

      - name: Verify matched binary prints version (lib binary)
        if: ${{ matrix.shell == 'pwsh' }}
        run: |
          $Expected = "0.0.1"
          Write-Host "Expected version: $Expected"
          $Binary = ".\dist\win-lib.exe"
          Write-Host "Testing $Binary"
          $Out = & .\$Binary
          Write-Host "Output: $Out"
          if ($Out -ne $Expected) {
            Write-Error "Version mismatch (got '$Out')"
            exit 1
          }
        shell: pwsh


